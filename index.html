<!DOCTYPE html>
<html lang="en">
<head>
    <title>Roof Tracker</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="page_container">

    <h1></h1>

    <div id="timer-container">
   <h1 id="timer-dp">Start</h1>
   <h1 id="show-timer">Show Timer ⏱️</h1>
    </div>

<div id="shortcut-header">
<button id="copy-tsc-btn" class="copy-btn">Copy TSC 📋</button>
<button id="delete-user" class="delete-all-btn">Delete User Account</button>
</div>

    <div id="input-container">
        <input id="job-id-input" placeholder="Paste Job ID here">
        <button id="add-job-btn">Add</button>
    </div>

    <dialog id="job-form">
        <h3>Job Details</h3>
        <div id="dialog-pts-btn">
            
        <input id="job-points" type="number" placeholder="Points (1, 2, 3, 4.5...)">
                <button class="point-btn" data-category="1">1</button>
           <button class="point-btn" data-category="2">2</button>
              <button class="point-btn" data-category="3">3</button>
                 <button class="point-btn" data-category="4.5">4.5</button>
                </div>
        <input id="job-link" placeholder="Paste link here">
        <select id="job-status">
            <option value="Open">Open</option>
            <option value="Passed">Passed</option>
            <option value="Rework">Rework</option>
        </select>
        <div id="dialog-btns">
            <button id="confirm-job-btn" class="confirm-job-btn">Confirm</button>
            <button id="cancel-job-btn" class="cancel-job-btn">Cancel</button>
        </div>
    </dialog>

    <dialog id="edit-job-form">
        <h3>Edit Job Details</h3>
        <div id="edit-dialog-pts-btn">
        <input id="edit-job-id-input" placeholder="Job ID " name="dsa">
        <input id="edit-job-points" type="number" placeholder="Points">
               
                </div>
        <input id="edit-job-link" placeholder="Measurement Link">
        <select id="edit-job-status">
            <option value="Open">Open</option>
            <option value="Passed">Passed</option>
            <option value="Rework">Rework</option>
        </select>
        <div id="edit-dialog-btns">
            <button id="edit-confirm-job-btn" class="confirm-job-btn">Confirm</button>
            <button id="edit-cancel-job-btn" class="cancel-job-btn">Cancel</button>
        </div>
    </dialog>

      <dialog id="user-form">
        <h3>Account Information</h3>
        <div id="dialog-pts-btn">
         <input id="tech-no" type="number" placeholder="Tech Number"> 
         <input id="user-name" placeholder="User Name">
        <select id="user-shift">
            <option value="Day">Day Shift</option>
            <option value="Night">Night Shift</option>
        </select>
    </div>
        <div id="dialog-btns">
            <button id="confirm-user-btn" class="confirm-job-btn">Confirm</button>
            <button id="cancel-user-btn" class="cancel-job-btn">Cancel</button>
        </div>
    </dialog>


    <div id="history-container">
        <div id="history-header">
            <h3>Work History</h3>
            <h4 id="total-points">Total Points:</h4>
            <button id="export-btn">Export CSV</button>
            <button id="copy-btn" class="copy-btn">Copy</button>
            <button id="delete-all-btn" class="delete-all-btn">Delete All</button>
        </div>
        <table id="history-table">
            <thead>
                <tr>
                    <th>Link</th>
                    <th>Job ID</th>
                    <th>Points</th>
                    <th>Status</th>
                    <th>Time</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="history-body">
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
